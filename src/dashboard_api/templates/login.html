<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CleanCam AI — Login</title>
    <meta name="description" content="Login to CleanCam AI Monitoring Dashboard">
    <meta name="theme-color" content="#22C55E">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="/static/icons/icon-192.png">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
    <link rel="stylesheet" href="/static/css/dashboard.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <img src="/static/icons/icon-192.png" alt="CleanCam AI" class="login-logo">
                <h1 class="login-title">CleanCam AI</h1>
                <p class="login-subtitle">Sign in to access the monitoring dashboard</p>
            </div>

            {% if error %}
            <div class="login-error" id="login-error">
                <span class="error-icon">⚠️</span>
                <span>{{ error }}</span>
            </div>
            {% endif %}

            <form class="login-form" method="POST" action="/auth/login">
                <div class="form-group">
                    <label for="email" class="form-label">Email</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        class="form-input"
                        placeholder="admin@cleancam.ai"
                        required
                        autocomplete="email"
                    >
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        class="form-input"
                        placeholder="••••••••"
                        required
                        autocomplete="current-password"
                    >
                </div>

                <button type="submit" class="login-btn" id="login-submit">
                    <span class="btn-text">Sign In</span>
                    <span class="btn-icon">→</span>
                </button>
            </form>

            <div class="login-footer">
                <p>CleanCam AI Monitoring System</p>
                <p class="login-footer-sub">Authorized personnel only</p>
            </div>
        </div>
    </div>
</body>
</html>
